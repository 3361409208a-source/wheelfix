name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Self-Contained)
        run: dotnet publish -c Release

      - name: Publish (Framework-Dependent)
        run: dotnet publish -c Release --self-contained false -p:PublishSingleFile=false -o bin/Release/publish-fd

      - name: Rename files
        run: |
          mv bin/Release/net10.0-windows/win-x64/publish/WheelFix.exe bin/Release/net10.0-windows/win-x64/publish/WheelFix-self-contained.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net10.0-windows/win-x64/publish/WheelFix-self-contained.exe
            bin/Release/publish-fd/WheelFix.exe
